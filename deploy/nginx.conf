server {
    listen 80;
    server_name clinbase.ru www.clinbase.ru;

    # Redirect www → non-www
    if ($host = www.clinbase.ru) {
        return 301 https://clinbase.ru$request_uri;
    }

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP → HTTPS
    location / {
        return 301 https://clinbase.ru$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name clinbase.ru;

    ssl_certificate     /etc/letsencrypt/live/clinbase.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clinbase.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Static files — Next.js serves from _next
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000/_next/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /public/ {
        proxy_pass http://127.0.0.1:3000/public/;
        add_header Cache-Control "public, max-age=86400";
    }

    # Main proxy to Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        client_max_body_size 50M;
    }
}
